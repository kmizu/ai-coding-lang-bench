name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install matplotlib numpy pandas

      - name: Generate plots (canonical)
        run: python3 plot.py results/results.json --track canonical --tiers primary,secondary -o figures/

      - name: Generate plots (all tracks)
        run: python3 plot.py results/results.json -o figures-all/
